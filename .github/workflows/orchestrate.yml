name: ci

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
      - 'settings.json'
      - '.github/workflows/orchestrate.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'hooks/**'
      - 'tests/**'
      - 'settings.json'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tmux + zsh (for integration tests)
        run: sudo apt-get update && sudo apt-get install -y tmux zsh
      - name: Configure CI zsh (skip system rc traps)
        run: |
          echo 'setopt NO_GLOBAL_RCS' > ~/.zshenv
          touch ~/.zshrc
      - name: Install pytest
        run: python3 -m pip install --upgrade pip pytest
      - name: Unit tests (all)
        run: python3 -m pytest tests/ -v
      - name: Pipeline tests
        run: |
          ec=0
          bash tests/test_clmux_pipeline.sh || ec=$?
          if (( ec != 0 )); then
            echo "--- PIPELINE TEST FAILURE DIAGNOSTIC ---"
            tmux list-sessions 2>&1 || true
            for s in $(tmux list-sessions -F '#{session_name}' 2>/dev/null); do
              echo "=== session: $s ==="
              tmux list-panes -t "$s" -F '#{pane_id} pid=#{pane_pid} cmd=#{pane_current_command}' 2>&1 || true
              tmux capture-pane -t "$s" -p -S -20 2>&1 || true
            done
          else
            echo "pipeline tests OK"
          fi
          exit "$ec"
        timeout-minutes: 3
      - name: Parity integration test
        run: bash tests/test_parity_integration.sh
        timeout-minutes: 2
