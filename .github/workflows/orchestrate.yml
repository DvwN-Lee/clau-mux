name: orchestrate

on:
  pull_request:
    paths:
      - 'scripts/_orch.py'
      - 'scripts/clmux_orchestrate.py'
      - 'scripts/clmux_pipeline.py'
      - 'tests/test_orchestrate*'
      - 'tests/test_clmux_pipeline*'
      - '.github/workflows/orchestrate.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/_orch.py'
      - 'scripts/clmux_orchestrate.py'
      - 'scripts/clmux_pipeline.py'
      - 'tests/test_orchestrate*'
      - 'tests/test_clmux_pipeline*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tmux + zsh (for integration tests)
        run: sudo apt-get update && sudo apt-get install -y tmux zsh
      - name: Install pytest
        run: python3 -m pip install --upgrade pip pytest
      - name: Unit tests
        run: python3 -m pytest tests/test_orchestrate.py -v
      - name: Integration test
        run: bash tests/test_orchestrate_integration.sh
        timeout-minutes: 2
      - name: Pipeline tests
        run: bash tests/test_clmux_pipeline.sh
        timeout-minutes: 3
